name: Monitor App Listings

# Uruchom skrypt co 6 godzin oraz na żądanie (przycisk "Run workflow" w UI GitHuba)
on:
  schedule:
    - cron: '0 */6 * * *'  # co 6h (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:  # ręczne uruchomienie z UI GitHuba

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # potrzebne żeby skrypt commitował snapshots i assets z powrotem do repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit and push snapshots & assets
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add snapshots/ assets/ output/
          if ! git diff --staged --quiet; then
            git commit -m "Auto: snapshot update $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "Brak zmian do commita"
          fi

      - name: Deploy dashboard to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: false
