# Lista monitorowanych aplikacji
# Aby dodać nową apkę: dopisz blok poniżej i commituj do repo.
# Skrypt automatycznie zacznie ją monitorować w następnym runie.

apps:
  - name: "Microsoft Edge"
    slug: "microsoft-edge"
    alerts_enabled: true  # slider on/off — gdy false: monitorujemy + dashboard, ale BEZ pushy
    ios:
      bundle_id: "com.microsoft.msedge"
      country: "us"  # kod kraju ISO. Empirycznie sprawdziliśmy że release_date jest
                     # globalnie zsynchronizowany dla Edge (PL = US co do sekundy),
                     # więc nie ma sensu duplikować apki per kraj. Dla apek lokalizowanych
                     # (np. lokalne banki) zrób osobną entry z innym slugiem i krajem.
    android:
      package_name: "com.microsoft.emmx"
      country: "us"

  - name: "Google Chrome"
    slug: "google-chrome"
    alerts_enabled: true  # przykład — monitorujemy konkurencję dla Edge
    ios:
      bundle_id: "com.google.chrome.ios"
      country: "us"
    android:
      package_name: "com.android.chrome"
      country: "us"

  # Przykład: monitoring SILENT (snapshot + dashboard, BEZ alertów na Google Chat).
  # Przydatne gdy chcesz mieć historię zmian dla apki ale nie chcesz dostawać pushy.
  # Odkomentuj żeby aktywować.
  #
  # - name: "Mozilla Firefox"
  #   slug: "mozilla-firefox"
  #   alerts_enabled: false  # ← silent mode
  #   ios:
  #     bundle_id: "org.mozilla.ios.Firefox"
  #     country: "us"
  #   android:
  #     package_name: "org.mozilla.firefox"
  #     country: "us"

  # Przykład rozszerzenia (odkomentuj żeby aktywować):
  # - name: "Google Chrome"
  #   slug: "google-chrome"
  #   ios:
  #     bundle_id: "com.google.chrome.ios"
  #     country: "us"
  #   android:
  #     package_name: "com.android.chrome"
  #     country: "us"

# Ustawienia globalne
settings:
  # Próg dla perceptual hash (im niższa wartość, tym czulszy detector)
  # 0-5 = bardzo czuły, łapie nawet drobne zmiany
  # 5-10 = standard, ignoruje rekompresję i drobne korekty
  # 10+ = tylko duże zmiany
  phash_threshold: 5

  # Czy używać Gemini do opisu zmian wizualnych?
  # Wymaga GEMINI_API_KEY w środowisku (.env lub GitHub Secret)
  use_gemini_vision: true

  # Czy generować lokalny HTML dashboard?
  generate_html_dashboard: true

  # Kanały alertów (włącz/wyłącz)
  alerts:
    google_chat:
      enabled: true  # zmień na true gdy ustawisz GOOGLE_CHAT_WEBHOOK_URL
    telegram:
      enabled: false  # zmień na true gdy ustawisz TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID
    email:
      enabled: false  # zmień na true gdy ustawisz RESEND_API_KEY i recipients
      recipients:
        - "twoj-email@example.com"
